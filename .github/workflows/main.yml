name: Microservices CI (Gradle + Security + Docker)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: BUILD ALL SERVICES (PARALLEL)
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [api-gateway, eureka-server, student-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17 + Gradle Cache
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ${{ matrix.service }}/gradlew

      - name: Build Service
        working-directory: ${{ matrix.service }}
        run: |
          ./gradlew build \
            --parallel \
            --build-cache \
            --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/build/libs/*.jar


  # ─────────────────────────────────────────────
  # JOB 2: OWASP DEPENDENCY CHECK
  # ─────────────────────────────────────────────
  owasp:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Run OWASP Dependency Check
        run: ./gradlew dependencyCheckAnalyze

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: build/reports/dependency-check/


  # ─────────────────────────────────────────────
  # JOB 3: SONARCLOUD ANALYSIS
  # ─────────────────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for proper analysis :contentReference[oaicite:0]{index=0}

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Run SonarCloud Scan
        run: |
          ./gradlew sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}


  # ─────────────────────────────────────────────
  # JOB 4: SEMGREP SAST (ALPINE CONTAINER)
  # ─────────────────────────────────────────────
  semgrep:
    runs-on: ubuntu-latest
    needs: build
    container:
      image: returntocorp/semgrep  # lightweight container

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep Scan
        run: |
          semgrep scan \
            --config=p/java \
            --config=p/spring \
            --config=p/owasp-top-ten \
            --json \
            --output=semgrep.json \
            --error

      - name: Upload Semgrep Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.json


  # ─────────────────────────────────────────────
  # JOB 5: GITLEAKS (SECRETS SCAN - LIGHT)
  # ─────────────────────────────────────────────
  gitleaks:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/gitleaks/gitleaks:latest detect \
            --source=/repo \
            --report-format=json \
            --report-path=/repo/gitleaks.json

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.json


  # ─────────────────────────────────────────────
  # JOB 6: DOCKER BUILD (PER SERVICE)
  # ─────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        service: [api-gateway, eureka-server, student-service]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -t myapp-${{ matrix.service }}:latest \
            ${{ matrix.service }}

      - name: Show Docker Images
        run: docker images


  # ─────────────────────────────────────────────
  # FINAL QUALITY GATE
  # ─────────────────────────────────────────────
  gate:
    runs-on: ubuntu-latest
    needs: [build, owasp, sonar, semgrep, gitleaks, docker]

    steps:
      - name: All checks passed
        run: echo "✅ CI Pipeline Successful - Ready for Deployment"
